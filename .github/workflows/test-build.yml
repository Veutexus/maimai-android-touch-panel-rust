name: Test Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Prepare release files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release
          Copy-Item target/x86_64-pc-windows-msvc/release/maimai-touch-rs.exe release/
          Copy-Item config.toml release/
          Copy-Item -Recurse image release/
          Copy-Item start.bat release/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: maimai-touch-rs-windows-x64
          path: release/
