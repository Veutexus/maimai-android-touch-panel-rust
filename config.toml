# Edited image path | 编辑好的图片路径
image_path = "./image/image_monitor.png"

[serial]
# COM port | 串口号
port = "COM33"
# Baud rate | 比特率
baudrate = 9600

[android]
# Maximum touch slots | 多点触控数量
max_slot = 12
# Actual screen size in pixels [width, height] | 设备实际屏幕大小
monitor_size = [1600, 2560]
# Touch input size in pixels [width, height] | 设备触控屏幕大小
input_size = [1600, 2560]
# Rotate screen 180 degress (enable when charging port faces up) | 是否开启屏幕反转
reverse_monitor = false
# ADB device serial number (leave empty for single device) | 指定触控设备序列号
specified_device = ""

[detection]
# Detection area radius in pixels | 检测区域的像素值范围
area_scope = 50
# Number of sample points on circle | 检测区域圆上点的数量
area_point_num = 8

[performance]
# Enable sleep in touch thread (turn on if CPU usage too high) | 是否启用 sleep
sleep_mode = false
# Sleep delay in microseconds | 每次 sleep 的延迟(微秒)
sleep_delay_us = 100
# Time compensation for busy-wait sleep calibration | 时间补偿值
time_compensation = 1.0

